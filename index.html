<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Hamburgueria Blackdot</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: Arial, Helvetica, sans-serif;
            background: #0d0f14;
            color: #ffffff;
        }

        .card {
            width: 100%;
            max-width: 460px;
            padding: 32px;
            background: #171a21;
            border: 1px solid #2b303a;
            border-radius: 22px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .logo {
            width: 62px;
            height: 62px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 22px;
            border-radius: 18px;
            background: #f5a623;
            color: #111111;
            font-size: 32px;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 28px;
        }

        p {
            margin-bottom: 28px;
            color: #a9b0bd;
            line-height: 1.5;
        }

        .botao {
            width: 100%;
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 14px;
            background: #f5a623;
            color: #111111;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        .status {
            margin-top: 22px;
            color: #7e8795;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>

<body>
    <main class="card">
        <div class="logo">🍔</div>

        <h1>Hamburgueria Blackdot</h1>

        <p>
            Sistema interno de escalas, entregas e pagamentos.
        </p>

        <button class="botao" type="button">
            Entrar no sistema
        </button>

        <div class="status">
            Sistema em desenvolvimento
        </div>
    </main>
</body>
</html>
